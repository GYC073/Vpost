<style>
  .calendar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-month { font-size: 16px; font-weight: 700; color: var(--text); }
  .cal-nav { display: flex; gap: 6px; }
  .cal-nav-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 16px;
    transition: all 0.2s;
  }
  .cal-nav-btn:hover { border-color: var(--primary); color: var(--primary); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-name {
    text-align: center; font-size: 11px; font-weight: 600;
    color: var(--text-hint); padding: 4px 0; text-transform: uppercase;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
    font-size: 14px;
    color: var(--ink);
    gap: 3px;
    border: 1.5px solid transparent;
    font-variant-numeric: tabular-nums;
  }
  .cal-day:hover { background: var(--blue-light); border-color: var(--blue-mid); }
  .cal-day.other-month { color: var(--ink-30); }
  .cal-day.today { background: var(--blue); color: #fff; font-weight: 700; font-family: var(--font-display); box-shadow: 0 4px 12px rgba(37,99,235,0.35); }
  .cal-day.today:hover { background: var(--blue-dark); }
  .cal-day.selected {
    background: #fff;
    border-color: var(--blue);
    color: var(--blue);
    font-weight: 700;
    box-shadow: 0 0 0 4px var(--blue-mid), 0 6px 16px rgba(37,99,235,0.2);
    transform: scale(1.06);
    z-index: 1;
  }
  .cal-day.today.selected { background: var(--blue-dark); color: #fff; border-color: #fff; box-shadow: 0 0 0 4px var(--blue), 0 6px 16px rgba(37,99,235,0.4); }
  .cal-dot {
    width: 5px; height: 5px; border-radius: 50%;
    flex-shrink: 0;
  }
  .cal-dot.posted { background: var(--green); }
  .cal-dot.auto { background: var(--amber); }
  .cal-dot.pending { background: var(--blue); }
  .cal-dot.scheduled { background: var(--purple); }
  .cal-day.today .cal-dot { background: rgba(255,255,255,0.85); }
  .cal-day.selected:not(.today) .cal-dot.posted { background: var(--green); }

  .filter-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--blue-light); color: var(--blue);
    padding: 5px 10px 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    border: 1px solid var(--blue-mid);
    animation: pillIn 0.2s ease both;
  }
  .filter-pill button {
    background: none; border: none; cursor: pointer; color: var(--blue);
    padding: 0; display: flex; align-items: center; font-size: 14px;
    border-radius: 50%; width: 18px; height: 18px;
  }
  .filter-pill button:hover { background: var(--blue); color: #fff; }
  @keyframes pillIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .empty-state {
    text-align: center; padding: 32px 20px;
    background: var(--white); border: 1px dashed var(--ink-10);
    border-radius: var(--r-lg); color: var(--ink-50);
  }
  .empty-state i { font-size: 28px; color: var(--ink-30); display: block; margin-bottom: 8px; }
  .empty-state-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .empty-state-sub { font-size: 12.5px; color: var(--ink-50); }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .post-list { display: flex; flex-direction: column; gap: 10px; }
  .post-list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .post-list-item:hover { border-color: var(--primary); }
  .post-date-badge {
    min-width: 44px;
    text-align: center;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 6px 8px;
    border: 1px solid var(--border);
  }
  .post-date-day { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
  .post-date-mon { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; }
  .post-list-info { flex: 1; min-width: 0; }
  .post-list-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-list-meta { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
  .post-list-meta i { font-size: 13px; }
  .post-list-status {
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
    white-space: nowrap;
  }
  .status-posted { background: var(--accent-light); color: #0F6E56; }
  .status-auto { background: var(--orange-light); color: #9A3412; }
  .status-pending { background: var(--primary-light); color: var(--primary-dark); }
  .status-scheduled { background: var(--purple-light); color: var(--purple); }

  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .list-title { font-size: 15px; font-weight: 700; color: var(--text); }
</style>

<script>
const dayNames = ['CN','T2','T3','T4','T5','T6','T7'];
const monthNames = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
const monthShort = ['Th1','Th2','Th3','Th4','Th5','Th6','Th7','Th8','Th9','Th10','Th11','Th12'];

/* ===== STATE ===== */
const today = new Date();
let currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
let selectedDate = null; // { year, month, day }
let monthPosts = {}; // keyed by 'YYYY-MM-DD' → array of posts on that day
let isLoadingMonth = false;

function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

// Map DB status → calendar status
const STATUS_MAP = {
  posted: 'posted',
  scheduled: 'scheduled',
  pending: 'pending',
  auto_posted: 'auto',
  auto: 'auto'
};

// Chọn ngày hiển thị cho 1 bài: posted_at > scheduled_at > created_at
function pickPostDate(p) {
  const s = p.posted_at || p.scheduled_at || p.created_at;
  return s ? new Date(s) : null;
}

function fmtHHMM(d) {
  if (!d) return '';
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function shortTitle(caption, max = 70) {
  if (!caption) return '(Không có caption)';
  const oneLine = caption.replace(/\s+/g, ' ').trim();
  return oneLine.length > max ? oneLine.slice(0, max - 1) + '…' : oneLine;
}

/* ===== LOAD MONTH POSTS TỪ SUPABASE ===== */
async function loadMonthPosts(year, month) {
  monthPosts = {};
  if (!window.vpostPosts?.list) return;

  // Lấy khoảng thời gian rộng để cover scheduled_at và posted_at và created_at
  // Đơn giản: fetch 200 bài mới nhất, lọc trong JS theo tháng đang xem
  const { data, error } = await window.vpostPosts.list({ limit: 200 });
  if (error) {
    console.warn('[Vpost] calendar load posts error:', error);
    return;
  }

  (data || []).forEach(p => {
    const d = pickPostDate(p);
    if (!d) return;
    if (d.getFullYear() !== year || d.getMonth() !== month) return;
    const key = dateKey(year, month, d.getDate());
    const item = {
      id: p.id,
      title: shortTitle(p.caption),
      caption: p.caption,
      image_url: p.image_url,
      status: STATUS_MAP[p.status] || 'scheduled',
      time: fmtHHMM(d),
      interactions: p.interactions || null,
      day: d.getDate(), month, year,
      _raw: p
    };
    if (!monthPosts[key]) monthPosts[key] = [];
    monthPosts[key].push(item);
  });
}

/* ===== RENDER CALENDAR ===== */
async function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('calMonth').textContent = `${monthNames[month]}, ${year}`;

  if (!isLoadingMonth) {
    isLoadingMonth = true;
    try { await loadMonthPosts(year, month); }
    finally { isLoadingMonth = false; }
  }

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  dayNames.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = daysInPrev - i;
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.innerHTML = `<span>${d}</span>`;

    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
    if (isToday) el.classList.add('today');

    const dayPosts = monthPosts[dateKey(year, month, d)];
    if (dayPosts && dayPosts.length) {
      // Ưu tiên hiển thị status quan trọng nhất: pending > scheduled > auto > posted
      const priority = { pending:0, scheduled:1, auto:2, posted:3 };
      const top = [...dayPosts].sort((a,b)=> (priority[a.status]??9) - (priority[b.status]??9))[0];
      const dotEl = document.createElement('div');
      dotEl.className = `cal-dot ${top.status}`;
      el.appendChild(dotEl);
      if (dayPosts.length > 1) {
        const cntEl = document.createElement('div');
        cntEl.style.cssText = 'position:absolute;bottom:2px;right:4px;font-size:9px;font-weight:700;color:var(--text-secondary)';
        cntEl.textContent = dayPosts.length;
        el.style.position = 'relative';
        el.appendChild(cntEl);
      }
    }

    if (selectedDate && selectedDate.year === year && selectedDate.month === month && selectedDate.day === d) {
      el.classList.add('selected');
    }

    el.onclick = () => onDayClick(year, month, d);
    grid.appendChild(el);
  }

  renderPostList();
}

/* ===== DAY CLICK ===== */
function onDayClick(year, month, day) {
  if (selectedDate && selectedDate.year === year && selectedDate.month === month && selectedDate.day === day) {
    selectedDate = null; // bỏ chọn
  } else {
    selectedDate = { year, month, day };
  }
  renderCalendar();
  // scroll mượt tới danh sách
  const list = document.getElementById('postList');
  if (list) list.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearSelection() {
  selectedDate = null;
  renderCalendar();
}

/* ===== RENDER POST LIST ===== */
const statusLabels = { posted:'Đã đăng', auto:'AI tự đăng', pending:'Chờ duyệt', scheduled:'Đã lên lịch' };
const statusIcons  = { posted:'ti-brand-facebook', auto:'ti-robot', pending:'ti-clock', scheduled:'ti-calendar' };

function postItemHTML(post) {
  let meta;
  const interTxt = post.interactions ? ` · ${post.interactions} tương tác` : '';
  if (post.status === 'posted') meta = `Đăng lúc ${post.time}${interTxt}`;
  else if (post.status === 'auto') meta = `AI tự đăng lúc ${post.time}${interTxt}`;
  else if (post.status === 'pending') meta = `Tự đăng lúc ${post.time} nếu bỏ qua`;
  else meta = `Lên lịch đăng lúc ${post.time}`;

  return `
    <div class="post-list-item">
      <div class="post-date-badge">
        <div class="post-date-day">${post.day}</div>
        <div class="post-date-mon">${monthShort[post.month]}</div>
      </div>
      <div class="post-list-info">
        <div class="post-list-title">${post.title}</div>
        <div class="post-list-meta"><i class="ti ${statusIcons[post.status]}"></i>${meta}</div>
      </div>
      <span class="post-list-status status-${post.status}">${statusLabels[post.status]}</span>
    </div>`;
}

function renderPostList() {
  const list = document.getElementById('postList');
  const titleEl = document.getElementById('listTitle');
  const pillSlot = document.getElementById('filterPillSlot');
  if (!list) return;

  if (selectedDate) {
    const key = dateKey(selectedDate.year, selectedDate.month, selectedDate.day);
    const dayPosts = monthPosts[key] || [];
    titleEl.textContent = `Bài đăng ngày ${selectedDate.day}/${selectedDate.month + 1}`;
    pillSlot.innerHTML = `<span class="filter-pill"><i class="ti ti-filter"></i>Đã chọn ngày<button onclick="clearSelection()" title="Bỏ lọc"><i class="ti ti-x"></i></button></span>`;
    if (dayPosts.length) {
      list.innerHTML = dayPosts.map(postItemHTML).join('');
    } else {
      list.innerHTML = `
        <div class="empty-state">
          <i class="ti ti-calendar-off"></i>
          <div class="empty-state-title">Chưa có bài đăng cho ngày này</div>
          <div class="empty-state-sub">Bấm "Tạo bài AI" ở trang chủ để chuẩn bị bài cho ngày ${selectedDate.day}/${selectedDate.month + 1}</div>
        </div>`;
    }
    return;
  }

  // Không filter → flatten tất cả posts trong tháng, sort theo priority + ngày
  titleEl.textContent = 'Danh sách bài đăng';
  pillSlot.innerHTML = '';
  let posts = [];
  Object.values(monthPosts).forEach(arr => posts.push(...arr));
  const priority = { pending:0, scheduled:1, auto:2, posted:3 };
  posts.sort((a, b) => {
    if (priority[a.status] !== priority[b.status]) return priority[a.status] - priority[b.status];
    return b.day - a.day;
  });
  posts = posts.slice(0, 12);

  if (posts.length === 0) {
    list.innerHTML = `<div class="empty-state"><i class="ti ti-calendar-off"></i><div class="empty-state-title">Chưa có bài nào tháng này</div><div class="empty-state-sub">Vào trang chủ tạo bài đầu tiên nhé!</div></div>`;
    return;
  }
  list.innerHTML = posts.map(postItemHTML).join('');
}

async function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  selectedDate = null; // đổi tháng thì xoá filter
  monthPosts = {};
  await renderCalendar();
}

// Init: chờ Supabase sẵn sàng rồi render
(async function initCalendar() {
  // Đợi một tick để supabase-client.js init xong
  await new Promise(r => setTimeout(r, 100));
  await renderCalendar();
})();
</script>

<script>
async function doLogout() {
  if (!confirm('Bạn có chắc muốn đăng xuất không?')) return;
  try {
    if (window.vpostAuth?.signOut) await window.vpostAuth.signOut();
  } catch (e) { console.warn('[Vpost] signOut error:', e); }
  localStorage.removeItem('vpost_user');
  const isInner = window.location.href.includes('/pages/');
  window.location.href = isInner ? '../login.html' : 'login.html';
}
</script>
